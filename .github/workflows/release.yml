name: Release

on:
  push:
    tags:
      - 'v*'

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.19"
  OTP_VERSION: "27"

jobs:
  # ── Quality gate (must pass before any precompile job) ───────────────────
  quality:
    name: Quality gate
    runs-on: blacksmith-2vcpu-ubuntu-2204

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential curl jq

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}
          restore-keys: deps-

      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Cache native/libs (CSPICE + jsmn)
        uses: actions/cache@v4
        with:
          path: native/libs
          key: native-libs-x86_64-linux-gnu-${{ hashFiles('native/native_sources.lock') }}

      - name: Cache PLT (Dialyzer)
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: plts-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: plts-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Get deps
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Credo
        run: mix credo --strict --ignore todo

      - name: Dialyzer
        run: mix dialyzer --format github

      - name: Unit tests
        run: mix test

      - name: Integration tests (spice_integration)
        run: mix test --include spice_integration

  # ── macOS (aarch64-apple-darwin) ─────────────────────────────────────────
  precompile-macos:
    name: Precompile / aarch64-apple-darwin
    needs: quality
    runs-on: blacksmith-2vcpu-ubuntu-2204-arm  # Blacksmith M1-equivalent ARM runner
    env:
      MIX_ENV: prod

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Cache native/libs (CSPICE + jsmn)
        uses: actions/cache@v4
        with:
          path: native/libs
          key: native-libs-aarch64-apple-darwin-${{ hashFiles('native/native_sources.lock') }}

      - name: Get Elixir deps
        run: mix deps.get

      - name: Precompile
        env:
          ELIXIR_MAKE_CACHE_DIR: ${{ github.workspace }}/cache
        run: |
          mkdir -p cache
          mix elixir_make.precompile

      - name: Upload artefacts
        uses: softprops/action-gh-release@v2
        with:
          files: cache/*.tar.gz

  # ── Linux (x86_64-linux-gnu) ─────────────────────────────────────────────
  precompile-linux:
    name: Precompile / x86_64-linux-gnu
    needs: quality
    runs-on: blacksmith-2vcpu-ubuntu-2204
    env:
      MIX_ENV: prod

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential curl jq

      - name: Cache native/libs (CSPICE + jsmn)
        uses: actions/cache@v4
        with:
          path: native/libs
          key: native-libs-x86_64-linux-gnu-${{ hashFiles('native/native_sources.lock') }}

      - name: Get Elixir deps
        run: mix deps.get

      - name: Precompile
        env:
          ELIXIR_MAKE_CACHE_DIR: ${{ github.workspace }}/cache
        run: |
          mkdir -p cache
          mix elixir_make.precompile

      - name: Upload artefacts
        uses: softprops/action-gh-release@v2
        with:
          files: cache/*.tar.gz

  # ── Generate checksum file ────────────────────────────────────────────────
  checksum:
    name: Generate checksum
    needs: [precompile-macos, precompile-linux]
    runs-on: blacksmith-2vcpu-ubuntu-2204
    env:
      MIX_ENV: prod

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Get Elixir deps
        run: mix deps.get

      - name: Fetch all precompiled artefacts and generate checksum
        run: |
          MIX_ENV=prod mix elixir_make.checksum --all --ignore-unavailable
          cat checksum-angelus.exs

      - name: Upload checksum file
        uses: softprops/action-gh-release@v2
        with:
          files: checksum-angelus.exs
