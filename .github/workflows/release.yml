name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.19"
  OTP_VERSION: "27"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  validate-release-ref:
    name: Validate release ref
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Verify release tag exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${{ github.repository }}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            exit 0
          fi

          echo "::error title=Release tag not found::Tag '${RELEASE_TAG}' does not exist on origin. Create and push it before running this workflow."
          echo "Example: git tag ${RELEASE_TAG} && git push origin ${RELEASE_TAG}"
          exit 1

      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Verify mix.exs version matches release tag
        run: |
          MIX_VERSION=$(grep -m1 '@version' mix.exs | sed 's/.*@version "\(.*\)".*/\1/')
          TAG_VERSION="${RELEASE_TAG#v}"

          if [ "${MIX_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error title=Version mismatch::mix.exs version '${MIX_VERSION}' does not match release tag '${RELEASE_TAG}'. Update @version in mix.exs before releasing."
            exit 1
          fi

          echo "Version check passed: mix.exs version '${MIX_VERSION}' matches tag '${RELEASE_TAG}'."

  ci:
    name: CI
    needs: validate-release-ref
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

  integration-tests:
    name: Integration tests
    needs: ci
    runs-on: ubuntu-24.04-arm
    env:
      ANGELUS_FORCE_BUILD: "1"

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential curl jq

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}
          restore-keys: deps-

      - name: Cache _build
        uses: actions/cache@v5
        with:
          path: _build
          key: build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Cache native/libs (CSPICE + jsmn)
        uses: actions/cache@v5
        with:
          path: native/libs
          key: native-libs-aarch64-linux-gnu-${{ hashFiles('native/native_sources.lock') }}

      - name: Get deps
        run: mix deps.get

      - name: Integration tests (spice_integration)
        run: mix test --include spice_integration

  # ── macOS (aarch64-apple-darwin) ─────────────────────────────────────────
  precompile-macos:
    name: Precompile / aarch64-apple-darwin
    needs: integration-tests
    runs-on: macos-14
    env:
      MIX_ENV: prod

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Cache native/libs (CSPICE + jsmn)
        uses: actions/cache@v5
        with:
          path: native/libs
          key: native-libs-aarch64-apple-darwin-${{ hashFiles('native/native_sources.lock') }}

      - name: Get Elixir deps
        run: mix deps.get

      - name: Precompile
        env:
          ELIXIR_MAKE_CACHE_DIR: ${{ github.workspace }}/_build/precompiled
          CC_PRECOMPILER_PRECOMPILE_ONLY_LOCAL: "true"
          TARGET_ARCH: aarch64
          TARGET_OS: apple
          TARGET_ABI: darwin
        run: |
          mkdir -p _build/precompiled
          mix elixir_make.precompile

      - name: Upload artefacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: _build/precompiled/*.tar.gz

  # ── Linux (x86_64-linux-gnu) ─────────────────────────────────────────────
  precompile-linux:
    name: Precompile / x86_64-linux-gnu
    needs: integration-tests
    runs-on: ubuntu-24.04
    env:
      MIX_ENV: prod

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential curl jq

      - name: Cache native/libs (CSPICE + jsmn)
        uses: actions/cache@v5
        with:
          path: native/libs
          key: native-libs-x86_64-linux-gnu-${{ hashFiles('native/native_sources.lock') }}

      - name: Get Elixir deps
        run: mix deps.get

      - name: Precompile
        env:
          ELIXIR_MAKE_CACHE_DIR: ${{ github.workspace }}/_build/precompiled
          CC_PRECOMPILER_PRECOMPILE_ONLY_LOCAL: "true"
          TARGET_ARCH: x86_64
          TARGET_OS: linux
          TARGET_ABI: gnu
        run: |
          mkdir -p _build/precompiled
          mix elixir_make.precompile

      - name: Upload artefacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: _build/precompiled/*.tar.gz

  # ── Linux (aarch64-linux-gnu) ────────────────────────────────────────────
  precompile-linux-aarch64:
    name: Precompile / aarch64-linux-gnu
    needs: integration-tests
    runs-on: ubuntu-24.04-arm
    env:
      MIX_ENV: prod

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential curl jq

      - name: Cache native/libs (CSPICE + jsmn)
        uses: actions/cache@v5
        with:
          path: native/libs
          key: native-libs-aarch64-linux-gnu-${{ hashFiles('native/native_sources.lock') }}

      - name: Get Elixir deps
        run: mix deps.get

      - name: Precompile
        env:
          ELIXIR_MAKE_CACHE_DIR: ${{ github.workspace }}/_build/precompiled
          CC_PRECOMPILER_PRECOMPILE_ONLY_LOCAL: "true"
          TARGET_ARCH: aarch64
          TARGET_OS: linux
          TARGET_ABI: gnu
        run: |
          mkdir -p _build/precompiled
          mix elixir_make.precompile

      - name: Upload artefacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: _build/precompiled/*.tar.gz

  # ── Generate checksum file ────────────────────────────────────────────────
  checksum:
    name: Generate checksum
    needs: [precompile-macos, precompile-linux, precompile-linux-aarch64]
    runs-on: ubuntu-24.04-arm
    env:
      MIX_ENV: prod

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Get Elixir deps
        run: mix deps.get

      - name: Fetch all precompiled artefacts and generate checksum
        run: |
          MIX_ENV=prod mix elixir_make.checksum --all --ignore-unavailable
          cat checksum.exs

      - name: Upload checksum file
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: checksum.exs

  # ── Publish to Hex.pm ────────────────────────────────────────────────────
  publish:
    name: Publish to Hex.pm
    needs: checksum
    runs-on: ubuntu-24.04-arm
    env:
      MIX_ENV: dev

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Get deps
        run: mix deps.get

      - name: Download checksum file
        run: |
          gh release download ${{ env.RELEASE_TAG }} \
            --pattern "checksum.exs" \
            --output checksum.exs
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to Hex.pm
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
