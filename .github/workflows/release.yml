name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.20.2"
  OTP_VERSION: "29.0.3"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  validate-release-ref:
    name: Validate release ref
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Verify release tag exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${{ github.repository }}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            exit 0
          fi

          echo "::error title=Release tag not found::Tag '${RELEASE_TAG}' does not exist on origin. Create and push it before running this workflow."
          echo "Example: git tag ${RELEASE_TAG} && git push origin ${RELEASE_TAG}"
          exit 1

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - name: Verify mix.exs version matches release tag
        run: |
          MIX_VERSION=$(grep -m1 '@version' mix.exs | sed 's/.*@version "\(.*\)".*/\1/')
          TAG_VERSION="${RELEASE_TAG#v}"

          if [ "${MIX_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error title=Version mismatch::mix.exs version '${MIX_VERSION}' does not match release tag '${RELEASE_TAG}'. Update @version in mix.exs before releasing."
            exit 1
          fi

          echo "Version check passed: mix.exs version '${MIX_VERSION}' matches tag '${RELEASE_TAG}'."

  create-draft-release:
    name: Create draft release
    needs: validate-release-ref
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Create or reuse draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if IS_DRAFT=$(gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" --json isDraft --jq .isDraft 2>/dev/null); then
            if [ "$IS_DRAFT" != "true" ]; then
              echo "::error title=Release already published::Release '${RELEASE_TAG}' already exists and is not a draft."
              exit 1
            fi

            echo "Reusing existing draft release '${RELEASE_TAG}'."
          else
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --draft \
              --verify-tag \
              --generate-notes \
              --title "$RELEASE_TAG"
          fi

  ci:
    name: CI
    needs: validate-release-ref
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

  e2e-tests:
    name: E2E tests
    needs: validate-release-ref
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      ANGELUS_FORCE_BUILD: "1"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          persist-credentials: false

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential curl jq ninja-build libcjson-dev python3-pip
          python3 -m pip install --user --break-system-packages 'meson>=1.11.1'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Get deps
        run: mix deps.get

      - name: Download and validate kernels
        run: mix angelus.prepare

      - name: E2E tests (CSPICE)
        run: mix test test/e2e --include e2e

  leak-check:
    name: Valgrind leak check
    needs: validate-release-ref
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      ANGELUS_FORCE_BUILD: "1"
      ANGELUS_WORKER: ${{ github.workspace }}/_build/test/lib/angelus/priv/angelus_worker

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          persist-credentials: false

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build and leak-check dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential curl jq ninja-build libcjson-dev python3-pip valgrind
          python3 -m pip install --user --break-system-packages 'meson>=1.11.1'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Get deps
        run: mix deps.get

      - name: Compile native worker
        run: mix compile

      - name: Run Valgrind leak check
        run: |
          elixir scripts/native_leak_check.exs

  # ── macOS (aarch64-apple-darwin) ─────────────────────────────────────────
  precompile-macos:
    name: Precompile / aarch64-apple-darwin
    needs: [create-draft-release, e2e-tests, ci, leak-check]
    runs-on: macos-14
    permissions:
      contents: write
    env:
      MIX_ENV: prod

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: brew install cjson meson ninja

      - name: Get Elixir deps
        run: mix deps.get

      - name: Precompile
        env:
          ELIXIR_MAKE_CACHE_DIR: ${{ github.workspace }}/_build/precompiled
          CC_PRECOMPILER_PRECOMPILE_ONLY_LOCAL: "true"
          TARGET_ARCH: aarch64
          TARGET_OS: apple
          TARGET_ABI: darwin
        run: |
          mkdir -p _build/precompiled
          mix elixir_make.precompile

      - name: Upload artefacts
        run: gh release upload "$RELEASE_TAG" _build/precompiled/*.tar.gz --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Linux (x86_64-linux-gnu) ─────────────────────────────────────────────
  precompile-linux:
    name: Precompile / x86_64-linux-gnu
    needs: [create-draft-release, e2e-tests, ci, leak-check]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      MIX_ENV: prod

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential curl jq ninja-build libcjson-dev python3-pip
          python3 -m pip install --user --break-system-packages 'meson>=1.11.1'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Get Elixir deps
        run: mix deps.get

      - name: Precompile
        env:
          ELIXIR_MAKE_CACHE_DIR: ${{ github.workspace }}/_build/precompiled
          CC_PRECOMPILER_PRECOMPILE_ONLY_LOCAL: "true"
          TARGET_ARCH: x86_64
          TARGET_OS: linux
          TARGET_ABI: gnu
        run: |
          mkdir -p _build/precompiled
          mix elixir_make.precompile

      - name: Upload artefacts
        run: gh release upload "$RELEASE_TAG" _build/precompiled/*.tar.gz --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Linux (aarch64-linux-gnu) ─────────────────────────────────────────────
  precompile-linux-arm64:
    name: Precompile / aarch64-linux-gnu
    needs: [create-draft-release, e2e-tests, ci, leak-check]
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    env:
      MIX_ENV: prod
      # setup-beam does not yet map GitHub's ubuntu24-arm64 ImageOS label.
      ImageOS: ubuntu24

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential curl jq ninja-build libcjson-dev python3-pip
          python3 -m pip install --user --break-system-packages 'meson>=1.11.1'
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Get Elixir deps
        run: mix deps.get

      - name: Precompile
        env:
          ELIXIR_MAKE_CACHE_DIR: ${{ github.workspace }}/_build/precompiled
          CC_PRECOMPILER_PRECOMPILE_ONLY_LOCAL: "true"
          TARGET_ARCH: aarch64
          TARGET_OS: linux
          TARGET_ABI: gnu
        run: |
          mkdir -p _build/precompiled
          mix elixir_make.precompile

      - name: Upload artefacts
        run: gh release upload "$RELEASE_TAG" _build/precompiled/*.tar.gz --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Generate checksum file ────────────────────────────────────────────────
  checksum:
    name: Generate checksum
    needs: [precompile-macos, precompile-linux, precompile-linux-arm64]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      MIX_ENV: prod

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Get Elixir deps
        run: mix deps.get

      - name: Fetch all precompiled artefacts and generate checksum
        run: |
          MIX_ENV=prod mix elixir_make.checksum --all --ignore-unavailable
          cat checksum.exs

      - name: Upload checksum file
        run: gh release upload "$RELEASE_TAG" checksum.exs --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  # ── Publish to Hex.pm ────────────────────────────────────────────────────
  publish:
    name: Publish to Hex.pm
    needs: checksum
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      MIX_ENV: dev

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Get deps
        run: mix deps.get

      - name: Download checksum file
        run: |
          gh release download "$RELEASE_TAG" \
            --pattern "checksum.exs" \
            --output checksum.exs
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to Hex.pm
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

  publish-release:
    name: Publish GitHub release
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --latest
