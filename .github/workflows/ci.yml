name: CI

on:
  pull_request:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to validate"
        required: false
        type: string

env:
  ELIXIR_VERSION: "1.19"
  OTP_VERSION: "27"
  MIX_ENV: test
  SKIP_CSPICE: "1"

jobs:
  format:
    name: Format
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential curl jq

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}
          restore-keys: deps-

      - name: Cache native/libs (CSPICE + jsmn)
        uses: actions/cache@v5
        with:
          path: native/libs
          key: native-libs-aarch64-linux-gnu-${{ hashFiles('native/native_sources.lock') }}

      - name: Get deps
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

  compile:
    name: Compile
    needs: format
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential curl jq

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}
          restore-keys: deps-

      - name: Cache _build
        uses: actions/cache@v5
        with:
          path: _build
          key: build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Cache native/libs (CSPICE + jsmn)
        uses: actions/cache@v5
        with:
          path: native/libs
          key: native-libs-aarch64-linux-gnu-${{ hashFiles('native/native_sources.lock') }}

      - name: Get deps
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

  credo:
    name: Credo
    needs: compile
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential curl jq

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}
          restore-keys: deps-

      - name: Cache _build
        uses: actions/cache@v5
        with:
          path: _build
          key: build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Cache native/libs (CSPICE + jsmn)
        uses: actions/cache@v5
        with:
          path: native/libs
          key: native-libs-aarch64-linux-gnu-${{ hashFiles('native/native_sources.lock') }}

      - name: Get deps
        run: mix deps.get

      - name: Credo
        run: mix credo --strict --ignore todo

  dialyzer:
    name: Dialyzer
    needs: compile
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential curl jq

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}
          restore-keys: deps-

      - name: Cache _build
        uses: actions/cache@v5
        with:
          path: _build
          key: build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Cache native/libs (CSPICE + jsmn)
        uses: actions/cache@v5
        with:
          path: native/libs
          key: native-libs-aarch64-linux-gnu-${{ hashFiles('native/native_sources.lock') }}

      - name: Cache PLT (Dialyzer)
        uses: actions/cache@v5
        with:
          path: priv/plts
          key: plts-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: plts-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Get deps
        run: mix deps.get

      - name: Dialyzer
        run: mix dialyzer --format github

  test:
    name: Test
    needs: compile
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential curl jq

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}
          restore-keys: deps-

      - name: Cache _build
        uses: actions/cache@v5
        with:
          path: _build
          key: build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Cache native/libs (CSPICE + jsmn)
        uses: actions/cache@v5
        with:
          path: native/libs
          key: native-libs-aarch64-linux-gnu-${{ hashFiles('native/native_sources.lock') }}

      - name: Get deps
        run: mix deps.get

      - name: Test
        run: mix test
