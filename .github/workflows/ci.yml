name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

env:
  ELIXIR_VERSION: "1.19"
  OTP_VERSION: "27"
  MIX_ENV: test

jobs:
  ci:
    name: Build & Check
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential curl jq

      - name: Cache deps
        uses: actions/cache@v5
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}
          restore-keys: deps-

      - name: Cache _build
        uses: actions/cache@v5
        with:
          path: _build
          key: build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: build-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Cache native/libs (CSPICE + jsmn)
        uses: actions/cache@v5
        with:
          path: native/libs
          key: native-libs-x86_64-linux-gnu-${{ hashFiles('native/native_sources.lock') }}

      - name: Get deps
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Credo
        run: mix credo --strict --ignore todo

      - name: Cache PLT (Dialyzer)
        uses: actions/cache@v5
        with:
          path: priv/plts
          key: plts-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: plts-${{ env.OTP_VERSION }}-${{ env.ELIXIR_VERSION }}-

      - name: Dialyzer
        run: mix dialyzer --format github

      - name: Test
        run: mix test
